name: planerz
description: Application de gestion de voyage entre amis.
publish_to: "none"
version: 0.2.0-beta1+6

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter_web_plugins:
    sdk: flutter
  cloud_firestore: ^6.2.0
  cloud_functions: ^6.1.0
  crypto: ^3.0.7
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  firebase_storage: ^13.2.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  flutter_svg: ^2.2.4
  app_badge_plus: ^1.2.8
  flutter_local_notifications: ^17.2.4
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  google_sign_in: ^7.2.0
  image_cropper: ^12.2.0
  image_picker: ^1.2.0
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  emoji_picker_flutter: ^4.4.0
  http: ^1.6.0
  font_awesome_flutter: ^11.0.0
  package_info_plus: ^10.1.0
  pub_semver: ^2.1.0
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  path: ^1.9.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true
  assets:
    - liste_courses_compilee.json
    - assets/images/app_icon.png
    - assets/images/about_bruno.jpg
    - assets/images/about_1.png
    - assets/images/about_2.png
    - assets/images/about_3.png
    - assets/images/about_4.png
    - assets/images/about_5.png
    - assets/images/about_6.png
    - assets/images/about_7.png
    - assets/images/about_8.png
    - assets/images/google_g.svg
    - assets/images/flag_fr.svg
    - assets/images/flag_us.svg
    - assets/images/chef_hat.svg
    - assets/images/hand_meal.svg
    - assets/images/tapas.svg
    - assets/images/meal_breakfast.svg
    - assets/images/meal_lunch.svg
    - assets/images/meal_dinner.svg
    - assets/images/meal_potluck_salty.svg
    - assets/images/meal_potluck_sweet.svg
    - assets/images/meal_potluck_soft.svg
    - assets/images/meal_potluck_alcohol.svg
    - legal/mentions_legales.txt
    - legal/vie_privee_rgpd.txt
    - legal/mentions_legales_en.txt
    - legal/vie_privee_rgpd_en.txt

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/images/app_icon.png
    background_color: "#2d1b4e"
    theme_color: "#6b4e9e"
  macos:
    generate: true
    image_path: assets/images/app_icon.png
  windows:
    generate: true
    image_path: assets/images/app_icon.png
